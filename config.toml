# syslog-mcp configuration

[syslog]
# Use 1514 to avoid needing root/CAP_NET_BIND_SERVICE for port 514
# iptables redirect 514 -> 1514 (see setup docs)
udp_bind = "0.0.0.0:1514"
tcp_bind = "0.0.0.0:1514"
max_message_size = 8192

[storage]
db_path = "/data/syslog.db"
pool_size = 4
retention_days = 90   # 0 = keep forever
wal_mode = true

[mcp]
bind = "0.0.0.0:3100"
server_name = "syslog-mcp"
