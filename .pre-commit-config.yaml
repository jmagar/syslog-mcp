repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
  - repo: local
    hooks:
      - id: skills-validate
        name: Validate skills
        entry: just validate-skills
        language: system
        pass_filenames: false
      - id: docker-security
        name: Docker security check
        entry: bash scripts/check-docker-security.sh
        language: system
        pass_filenames: false
      - id: no-baked-env
        name: No baked env vars
        entry: bash scripts/check-no-baked-env.sh
        language: system
        pass_filenames: false
      - id: ensure-ignore-files
        name: Ensure ignore files
        entry: bash hooks/scripts/ensure-ignore-files.sh --check
        language: system
        pass_filenames: false

      - id: block-env-commits
        name: Block .env file commits (allow only .env.example)
        entry: bash bin/block-env-commits.sh
        language: system
        pass_filenames: false
        files: '\.env'
        exclude: '\.env\.example$'
