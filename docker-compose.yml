services:
  syslog-mcp:
    build: .
    container_name: syslog-mcp
    restart: unless-stopped
    user: "${SYSLOG_UID:-1000}:${SYSLOG_GID:-1000}"
    env_file:
      - path: .env
        required: false
    ports:
      - "${SYSLOG_PORT:-1514}:1514/udp"
      - "${SYSLOG_PORT:-1514}:1514/tcp"
      - "${SYSLOG_MCP_PORT:-3100}:3100/tcp"
    volumes:
      - ${SYSLOG_MCP_DATA_VOLUME:-syslog-mcp-data}:/data
    # Needed if redirecting privileged port 514 -> 1514 inside container
    # cap_add:
    #   - NET_BIND_SERVICE
    networks:
      - proxy

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

volumes:
  syslog-mcp-data:

networks:
  proxy:
    name: ${DOCKER_NETWORK:-syslog_mcp}
    external: false
