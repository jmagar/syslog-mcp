services:
  syslog-mcp:
    build: .
    container_name: syslog-mcp
    restart: unless-stopped
    ports:
      - "1514:1514/udp"    # Syslog UDP
      - "1514:1514/tcp"    # Syslog TCP
      - "3100:3100/tcp"    # MCP HTTP
    volumes:
      - ./data:/data
    environment:
      - RUST_LOG=info
      - SYSLOG_MCP_STORAGE__DB_PATH=/data/syslog.db
    # Needed if redirecting privileged port 514 -> 1514 inside container
    # cap_add:
    #   - NET_BIND_SERVICE
    networks:
      - proxy

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

    labels:
      - "swag=enable"
      - "swag.url=syslog-mcp.tootie.tv"
      - "swag.port=3100"
      - "swag.proto=http"

networks:
  proxy:
    name: ${DOCKER_NETWORK:-syslog_mcp}
